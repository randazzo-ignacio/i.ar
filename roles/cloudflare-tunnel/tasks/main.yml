---
# roles/cloudflare-tunnel/tasks/main.yml
# Sets up Cloudflare Tunnel as a fallback VPN.
# If WireGuard is blocked, connect through Cloudflare's network.
# Tunnel runs on randazzo-ar (the proxy server, Fedora).
# All servers run Fedora Server 44 or AlmaLinux 10 (RHEL family).

# ── Install cloudflared ────────────────────────────────────
- name: Add Cloudflare repo
  command: "dnf copr enable -y cloudflare/cloudflared"
  args:
    creates: /etc/yum.repos.d/_copr_copr.fedorainfracloud.org_group_cloudflare_cloudflared.repo
  changed_when: false

- name: Install cloudflared
  dnf:
    name: cloudflared
    state: present

# ── Register tunnel ────────────────────────────────────────
- name: Check if tunnel already exists
  command: cloudflared tunnel list --output json
  register: tunnel_list
  changed_when: false
  failed_when: false

- name: Create tunnel
  command: "cloudflared tunnel create randazzo-fallback"
  register: tunnel_create
  when: >
    tunnel_list.rc == 0 and
    (tunnel_list.stdout | from_json | length == 0)
  environment:
    TUNNEL_TOKEN: "{{ cloudflare_tunnel_token }}"

# ── Configure tunnel as service ────────────────────────────
- name: Install tunnel as service
  command: "cloudflared service install {{ cloudflare_tunnel_token }}"
  args:
    creates: /etc/systemd/system/cloudflared.service
  environment:
    TUNNEL_TOKEN: "{{ cloudflare_tunnel_token }}"

- name: Enable cloudflared service
  service:
    name: cloudflared
    state: started
    enabled: true

# ── DNS route for fallback domain ──────────────────────────
- name: Create DNS route for fallback domain
  command: >
    cloudflared tunnel route dns randazzo-fallback {{ cloudflare_domain }}
  environment:
    TUNNEL_TOKEN: "{{ cloudflare_tunnel_token }}"
  changed_when: false
  failed_when: false
---
# playbooks/ollama.yml — Ollama installation on ollama_hosts.
# Usage: ansible-playbook playbooks/ollama.yml --vault-password-file .vault_pass

- name: Configure Ollama hosts
  hosts: ollama_hosts
  roles:
    - role: podman
      when: podman_enabled | default(false) | bool
    - role: ollama
      when: ollama_enabled | default(false) | bool

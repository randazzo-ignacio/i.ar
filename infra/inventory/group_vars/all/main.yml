# ── Domains ───────────────────────────────────────────────
domains:
  proxy: "randazzo.ar"
  proxy_alt: "randazzo.com.ar"
  ollama: "i.ar"
  ai: "0b.ar"

# ── WireGuard (shared) ─────────────────────────────────────
wg_interface: wg0
wg_port: 51820
wg_network: "10.66.0.0/16"
wg_dns: "10.66.0.1"
wg_keepalive: 25
wg_mtu: 1420
wg_hub: rammstein

# ── SSH defaults ───────────────────────────────────────────
ssh_port: 22
ssh_password_auth: "no"
ssh_permit_root_login: "prohibit-password"

# ── Timezone ───────────────────────────────────────────────
timezone: "America/Argentina/Buenos_Aires"

# ── Essential packages (RHEL family) ──────────────────────
base_packages:
  - vim
  - git
  - curl
  - wget
  - tmux
  - jq
  - python3
  - rsync
  - unzip
  - zstd
  - tar
  - net-tools
  - bind-utils

# ── Caddy defaults ─────────────────────────────────────────
caddy_version: "latest"
caddy_email: "ignacio@randazzo.ar"
caddy_config_path: "/etc/caddy/Caddyfile"

# ── Ollama defaults ────────────────────────────────────────
ollama_version: "latest"
ollama_port: 11434
ollama_install_dir: "/usr/local/bin"
ollama_models_dir: "/usr/share/ollama"
ollama_user: ollama
ollama_listen: "0.0.0.0"
ollama_gpu: false
ollama_models: []

# ── Local SSH user (for non-cloud hosts) ───────────────────
local_ssh_user: "nacho"

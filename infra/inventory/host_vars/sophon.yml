wg_ip: "10.66.0.5"
# No wg_endpoint — spoke connects to hub, no public endpoint needed.

# Ollama with GPU offloading
ollama_enabled: true
ollama_gpu: true
ollama_models:
  - "llama3.3:70b"
  - "qwen2.5-coder:14b"
ollama_listen: "10.66.0.5"  # bind to WireGuard IP only

# Podman (for GPU container support)
podman_enabled: true

# ── Frigate NVR ────────────────────────────────────────────
frigate_enabled: true

# Camera definitions — IPs only; credentials come from vault
# RTSP URLs are templated using frigate_camera_rtsp_user/password from vault
frigate_cameras:
  interior_1:
    friendly_name: "Interior 1"
    rtsp_host: "192.168.2.201"
    rtsp_path: "/ch0"
    roles: [detect, record]
  interior_2:
    friendly_name: "Interior 2"
    rtsp_host: "192.168.2.202"
    rtsp_path: "/ch0"
    roles: [detect, record]
  interior_3:
    friendly_name: "Interior 3"
    rtsp_host: "192.168.2.203"
    rtsp_path: "/ch0"
    roles: [detect, record]
  exterior_1:
    friendly_name: "Exterior 1"
    rtsp_host: "192.168.2.101"
    rtsp_path: "/ch0"
    roles: [detect, record, audio]
  exterior_2:
    friendly_name: "Exterior 2"
    rtsp_host: "192.168.2.102"
    rtsp_path: "/ch0"

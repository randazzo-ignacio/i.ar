---
# playbooks/monitoring.yml — Deploy only the monitoring stack.
# Usage: ansible-playbook playbooks/monitoring.yml --vault-password-file .vault_pass

- name: Node exporters (all hosts)
  hosts: all
  roles:
    - node-exporter

- name: Monitoring stack (daftpunk — Prometheus + Grafana)
  hosts: daftpunk
  roles:
    - role: podman
    - monitoring
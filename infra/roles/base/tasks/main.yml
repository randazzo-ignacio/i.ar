---
# roles/base/tasks/main.yml
# Applied to every host — hardening, updates, essential packages.
# All servers run Fedora Server 44 or AlmaLinux 10 (RHEL family).

# ── System update ──────────────────────────────────────────
- name: Update all packages
  dnf:
    name: "*"
    state: latest
  when: "'cloud' in group_names"

# ── Essential packages ──────────────────────────────────────
- name: Install essential packages
  dnf:
    name: "{{ base_packages }}"
    state: present
  when: "'cloud' in group_names"

# ── Timezone ───────────────────────────────────────────────
- name: Set timezone
  timezone:
    name: "{{ timezone }}"

# ── SSH hardening ──────────────────────────────────────────
- name: Configure sshd
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0644'
    validate: 'sshd -t -f %s'
  notify: restart sshd

- name: Disable SSH password auth
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication {{ ssh_password_auth }}'
  notify: restart sshd

- name: Set root login policy
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin {{ ssh_permit_root_login }}'
  notify: restart sshd

# ── Firewall (firewalld) ───────────────────────────────────
- name: Ensure firewalld is installed
  dnf:
    name: firewalld
    state: present
  when: "'cloud' in group_names"

- name: Ensure firewalld is running
  service:
    name: firewalld
    state: started
    enabled: true

- name: Allow SSH through firewalld
  ansible.posix.firewalld:
    port: "{{ ssh_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Allow WireGuard through firewalld
  ansible.posix.firewalld:
    port: "{{ wg_port }}/udp"
    permanent: true
    state: enabled
    immediate: true

# ── Automatic security updates ────────────────────────────
- name: Install dnf-automatic
  dnf:
    name: dnf-automatic
    state: present
  when: "'cloud' in group_names"

- name: Enable dnf-automatic timer
  service:
    name: dnf-automatic.timer
    state: started
    enabled: true
  when: "'cloud' in group_names"

# ── Sysctl hardening ───────────────────────────────────────
- name: Apply sysctl hardening
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ base_sysctl_settings }}"

# ── Create ansible user (non-root) on cloud servers ────────
- name: Create admin user on cloud servers
  user:
    name: admin
    groups: wheel
    shell: /bin/bash
    create_home: true
  when: "'cloud' in group_names"

- name: Add SSH key for admin user
  authorized_key:
    user: admin
    key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
  when: "'cloud' in group_names"

- name: Allow admin passwordless sudo
  copy:
    dest: /etc/sudoers.d/admin
    content: "admin ALL=(ALL) NOPASSWD:ALL\n"
    mode: '0440'
  when: "'cloud' in group_names"

---
# roles/portfolio-page/tasks/main.yml
# Deploys the personal portfolio landing page to rammstein (randazzo.ar).
# Caddy on rammstein serves the files directly via file_server.

# ── Deploy static files ──────────────────────────────────────
# The caddy role creates /var/www/randazzo.ar. This role fills it.

- name: Deploy index.html
  copy:
    src: index.html
    dest: "{{ portfolio_page_root }}/index.html"
    owner: caddy
    group: caddy
    mode: '0644'

- name: Deploy style.css
  copy:
    src: style.css
    dest: "{{ portfolio_page_root }}/style.css"
    owner: caddy
    group: caddy
    mode: '0644'

- name: Deploy script.js
  copy:
    src: script.js
    dest: "{{ portfolio_page_root }}/script.js"
    owner: caddy
    group: caddy
    mode: '0644'
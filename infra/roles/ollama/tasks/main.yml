---
# roles/ollama/tasks/main.yml
# Installs Ollama and pulls specified models.
# Runs on: i-ar (cloud, Fedora, CPU-only), server-pc (local, Fedora, GPU)
# All servers run Fedora Server 44 or AlmaLinux 10 (RHEL family).

# ── Create ollama user ──────────────────────────────────────
- name: Create ollama user
  user:
    name: "{{ ollama_user }}"
    system: true
    create_home: false
    shell: /sbin/nologin

